<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Beacon of Unity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="font-family:sans-serif; background:#f4f7f6; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <div id="authContainer" style="background:white; padding:30px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1); width:350px; text-align:center;">
        <h2 id="title">Beacon of Unity</h2>
        
        <div id="loginForm">
            <input type="email" id="email" placeholder="Email" style="width:90%; padding:10px; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Password" style="width:90%; padding:10px; margin-bottom:10px;">
            <button id="emailLoginBtn" style="width:95%; padding:10px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer;">Login / Sign Up</button>
            <hr>
            <button id="googleLoginBtn" style="width:95%; padding:10px; background:#db4437; color:white; border:none; border-radius:5px; cursor:pointer;">Sign in with Google</button>
        </div>

        <div id="verifySection" style="display:none;">
            <h3>Verify Your Identity</h3>
            <p id="instructionText">Please upload your Emirates ID front.</p>
            <div id="uploadControls">
                <input type="file" id="idPhoto" accept="image/*" style="margin-bottom:15px;">
                <button id="uploadBtn" style="width:95%; padding:10px; background:#27ae60; color:white; border:none; border-radius:5px; cursor:pointer;">Submit for Admin Approval</button>
            </div>
        </div>
        
        <p id="statusMsg" style="margin-top:15px; font-weight:bold; color: #2c3e50;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNYQbkHf9yQqGzN9qNRePHxQ5Z1dgfeE",
            authDomain: "beaconofunityofficial.firebaseapp.com",
            projectId: "beaconofunityofficial",
            storageBucket: "beaconofunityofficial.firebasestorage.app",
            messagingSenderId: "37918398882",
            appId: "1:37918398882:web:205161bb147393f4defafb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // --- AUTH STATE OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                const userData = userDoc.exists() ? userDoc.data() : null;

                if (userData && userData.status === "approved") {
                    window.location.href = "dashboard.html";
                    return;
                }

                document.getElementById('loginForm').style.display = "none";
                document.getElementById('verifySection').style.display = "block";

                if (userData && userData.status === "waiting for approval") {
                    document.getElementById('uploadControls').style.display = "none";
                    document.getElementById('instructionText').style.display = "none";
                    document.getElementById('statusMsg').innerText = "⏳ Verification Pending. Admin is reviewing your ID.";
                } else {
                    document.getElementById('statusMsg').innerText = "Account found. Please verify your ID.";
                }
            } else {
                document.getElementById('loginForm').style.display = "block";
                document.getElementById('verifySection').style.display = "none";
            }
        });

        // --- LOGIN LOGIC ---
        document.getElementById('emailLoginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } catch (err) { alert(err.message); }
            }
        };

        document.getElementById('googleLoginBtn').onclick = () => signInWithPopup(auth, provider);

        // --- UPDATED UPLOAD LOGIC ---
        document.getElementById('uploadBtn').onclick = async () => {
            const file = document.getElementById('idPhoto').files[0];
            const user = auth.currentUser;
            
            if(!file) return alert("Please select a photo first.");
            document.getElementById('uploadBtn').innerText = "Uploading...";
            document.getElementById('uploadBtn').disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    // 1. Fetch current user data to see if they were previously denied
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    let isRetry = false;

                    if (userSnap.exists()) {
                        // Check if the permanent flag exists in the user profile
                        isRetry = userSnap.data().hasPreviousDenial || false;
                    }

                    // 2. Add to review queue with the 'hasPreviousDenial' flag
                    await addDoc(collection(db, "id_reviews"), {
                        email: user.email,
                        userId: user.uid,
                        idCardUrl: reader.result,
                        hasPreviousDenial: isRetry, 
                        timestamp: new Date()
                    });

                    // 3. Set status to 'waiting' so they can't upload again immediately
                    await setDoc(userRef, {
                        email: user.email,
                        status: "waiting for approval"
                    }, { merge: true });

                    // 4. Update UI
                    document.getElementById('uploadControls').style.display = "none";
                    document.getElementById('instructionText').style.display = "none";
                    document.getElementById('statusMsg').innerText = "✅ Submitted! Admin will review your access.";
                } catch (error) {
                    console.error("Error:", error);
                    alert("Submission failed.");
                    document.getElementById('uploadBtn').disabled = false;
                    document.getElementById('uploadBtn').innerText = "Submit for Admin Approval";
                }
            };
        };
    </script>
</body>
</html>
