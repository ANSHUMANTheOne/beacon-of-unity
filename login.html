<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Verify - Beacon of Unity</title>
</head>
<body style="font-family:sans-serif; text-align:center; padding:40px; background:#f4f7f6;">
    <div style="max-width:400px; margin:auto; background:white; padding:30px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <h2>Secure ID Upload</h2>
        <input type="email" id="email" placeholder="Email Address" required style="width:90%; padding:10px; margin-bottom:15px; border:1px solid #ddd;">
        <div style="border: 2px dashed #3498db; padding: 20px; margin-bottom: 20px;">
            <p><strong>Emirates ID Photo</strong></p>
            <input type="file" id="photo" accept="image/*" style="width:100%;">
        </div>
        <button id="uploadBtn" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Upload to Secure Vault</button>
        <p id="msg" style="margin-top:15px; font-weight:bold;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Your specific config from image_4f4a28.png
        const firebaseConfig = {
            apiKey: "AIzaSyBqNYQbkHf9yQqGzN9qNRePHxQ5Z1dgfeE",
            authDomain: "beaconofunityofficial.firebaseapp.com",
            projectId: "beaconofunityofficial",
            storageBucket: "beaconofunityofficial.firebasestorage.app",
            messagingSenderId: "37918398882",
            appId: "1:37918398882:web:205161bb147393f4defafb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('uploadBtn').onclick = async () => {
            const file = document.getElementById('photo').files[0];
            const email = document.getElementById('email').value;
            const msg = document.getElementById('msg');
            
            if(!file || !email) return alert("Please provide email and photo");

            msg.innerText = "Encrypting and Uploading...";
            
            const reader = new FileReader();
            reader.readAsDataURL(file); // Converts image to text string for Firestore
            reader.onload = async () => {
                try {
                    // Saves to a collection called "id_reviews"
                    await addDoc(collection(db, "id_reviews"), {
                        email: email,
                        image: reader.result,
                        time: new Date()
                    });
                    msg.innerText = "✅ Successfully Stored!";
                    msg.style.color = "green";
                } catch (e) { 
                    msg.innerText = "❌ Error: " + e.message; 
                    msg.style.color = "red";
                }
            };
        };
    </script>
</body>
</html>
