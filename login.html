<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify - Beacon of Unity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Beacon of Unity</h1></header>
    <div style="max-width: 400px; margin: 40px auto; background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2>Secure Verification</h2>
        <p><small>Your data is encrypted. Only the admin can review these files.</small></p>
        
        <input type="email" id="userEmail" placeholder="Email Address" required style="width:90%; padding:10px; margin-bottom:10px; border:1px solid #ccc;">
        
        <div style="border: 2px dashed #3498db; padding: 15px; margin: 15px 0; background: #f9f9f9;">
            <p><strong>Upload Emirates ID (Front)</strong></p>
            <input type="file" id="idFront" accept="image/*" style="width: 100%;">
        </div>
        
        <button id="uploadBtn" style="width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Submit for Secure Review
        </button>
        
        <p id="status" style="margin-top: 15px; font-weight: bold;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

        // Your specific config
        const firebaseConfig = {
            apiKey: "AIzaSyBqNYQbkHf9yQqGzN9qNRePHxQ5Z1dgfeE",
            authDomain: "beaconofunityofficial.firebaseapp.com",
            projectId: "beaconofunityofficial",
            storageBucket: "beaconofunityofficial.firebasestorage.app",
            messagingSenderId: "37918398882",
            appId: "1:37918398882:web:205161bb147393f4defafb",
            measurementId: "G-L01XH8Q4KB"
        };

        // Initialize Firebase and Storage
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        // Handle the button click
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const email = document.getElementById('userEmail').value;
            const file = document.getElementById('idFront').files[0];
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');

            if (!email || !file) {
                alert("Please enter your email and select an ID photo.");
                return;
            }

            btn.disabled = true;
            status.innerText = "Encrypting and uploading securely...";
            status.style.color = "#34495e";

            // Create a secure reference: identities/user-email/front-id.jpg
            const storageRef = ref(storage, 'pending_verification/' + email + '_EID_Front');

            try {
                // Upload the file
                await uploadBytes(storageRef, file);
                status.innerText = "✅ Success! Admin will review your ID shortly.";
                status.style.color = "#27ae60";
            } catch (error) {
                console.error("Upload Error:", error);
                status.innerText = "❌ Upload failed. Make sure Storage Rules are set to 'Test Mode'.";
                status.style.color = "#e74c3c";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
