<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beacon of Unity · Code</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<style>
/* ── TOKENS ── */
:root { --ease:cubic-bezier(.16,1,.3,1); --blue:#0ea5e9; --cyan:#06b6d4; }
[data-theme="dark"]{
  --navy:#0c2d48; --sky:#e0f2fe; --sky2:#bae6fd; --sky3:#7dd3fc;
  --muted:#4a7c9e; --panel:#061522; --surface:#071828;
  --edge:rgba(14,165,233,.14); --text:#e0f2fe;
  --body-bg:#071e30; --card-bg:rgba(14,165,233,.07);
  --grid-color:rgba(255,255,255,.03); --orb1:rgba(14,165,233,.16);
}
[data-theme="light"]{
  --navy:#0c2d48; --sky:#e0f2fe; --sky2:#bae6fd; --sky3:#38bdf8;
  --muted:#4a7c9e; --panel:#f0f9ff; --surface:#e8f5fd;
  --edge:rgba(14,165,233,.18); --text:#0c2d48;
  --body-bg:#d6edfa; --card-bg:#fff;
  --grid-color:rgba(14,165,233,.06); --orb1:rgba(14,165,233,.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--body-bg);color:var(--text);cursor:none;transition:background .5s,color .5s}

/* ── CURSOR (exact from index.html) ── */
#cd{position:fixed;top:0;left:0;width:10px;height:10px;background:var(--blue);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .15s,height .15s,background .2s}
#cr{position:fixed;top:0;left:0;width:36px;height:36px;border:1.5px solid rgba(14,165,233,.5);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s var(--ease)}
body.hov #cd{width:18px;height:18px;background:var(--cyan)}
body.hov #cr{width:54px;height:54px;border-color:rgba(6,182,212,.7)}

/* ── GRID + ORBS ── */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid-color) 1px,transparent 1px),linear-gradient(90deg,var(--grid-color) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0;transition:background-image .5s}
.orb{position:fixed;border-radius:50%;filter:blur(72px);pointer-events:none;animation:od ease-in-out infinite;z-index:0}
.ob1{width:500px;height:500px;background:var(--orb1);top:-120px;right:-80px;animation-duration:12s}
.ob2{width:280px;height:280px;background:rgba(6,182,212,.1);bottom:-60px;left:3%;animation-duration:9s;animation-delay:-4s}
@keyframes od{0%,100%{transform:translate(0,0)scale(1)}50%{transform:translate(20px,-20px)scale(1.04)}}

/* ── LAYOUT ── */
#app{display:grid;grid-template-rows:52px 1fr 24px;grid-template-columns:46px 1fr;grid-template-areas:"header header" "sidebar main" "status status";height:100vh;position:relative;z-index:1}

/* ── HEADER ── */
#header{grid-area:header;display:flex;align-items:center;gap:12px;padding:0 20px;background:rgba(7,18,26,.88);border-bottom:1px solid var(--edge);backdrop-filter:blur(20px);z-index:50;transition:background .5s}
[data-theme="light"] #header{background:rgba(240,249,255,.92)}
.logo-wrap{display:flex;align-items:center;gap:9px;cursor:none}
.logo-mark{width:30px;height:30px;flex-shrink:0;transition:transform .3s}
.logo-wrap:hover .logo-mark{transform:rotate(-5deg) scale(1.08)}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--blue);letter-spacing:-.2px;white-space:nowrap}
.brand-sub{font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem;color:var(--cyan);letter-spacing:3px;opacity:.8;white-space:nowrap}
.hsep{width:1px;height:22px;background:var(--edge);flex-shrink:0}

/* author chip */
.author-chip{display:flex;align-items:center;gap:7px;padding:4px 12px 4px 8px;background:rgba(14,165,233,.07);border:1px solid rgba(14,165,233,.18);border-radius:50px;font-size:.72rem;color:var(--muted);white-space:nowrap;cursor:none;flex-shrink:0}
.author-avatar{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;color:#001828;flex-shrink:0}
.author-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;color:var(--blue)}

/* engine badge */
.eng-badge{display:flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(34,211,164,.07);border:1px solid rgba(34,211,164,.22);border-radius:50px;font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:1.5px;color:#22d3a4;white-space:nowrap;flex-shrink:0}
.eng-dot{width:6px;height:6px;border-radius:50%;background:#22d3a4;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hactions{display:flex;align-items:center;gap:5px;margin-left:auto}
.hbtn{display:flex;align-items:center;gap:6px;padding:5px 13px;background:transparent;border:1px solid transparent;border-radius:50px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:500;cursor:none;transition:all .22s;white-space:nowrap;position:relative;overflow:hidden}
.hbtn:hover{background:rgba(14,165,233,.09);border-color:rgba(14,165,233,.25);color:var(--text)}
.hbtn svg{flex-shrink:0}
.hbtn.run{background:#fff;color:var(--navy);border-color:transparent;font-family:'Syne',sans-serif;font-weight:700;padding:5px 18px}
[data-theme="light"] .hbtn.run{background:var(--navy);color:#fff}
.hbtn.run::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--blue),var(--cyan));opacity:0;transition:opacity .3s;z-index:0}
.hbtn.run:hover::before{opacity:1}
.hbtn.run:hover{color:#fff;transform:translateY(-2px);box-shadow:0 8px 24px rgba(14,165,233,.4)}
.hbtn.run span,.hbtn.run svg{position:relative;z-index:1}
.dial-mini{display:flex;align-items:center;gap:5px;padding:5px 10px;background:rgba(14,165,233,.07);border:1px solid var(--edge);border-radius:50px;cursor:none;transition:all .22s}
.dial-mini:hover{border-color:rgba(14,165,233,.4);background:rgba(14,165,233,.12)}

/* ── SIDEBAR ── */
#sidebar{grid-area:sidebar;background:rgba(7,18,26,.6);border-right:1px solid var(--edge);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;z-index:5;transition:background .5s}
[data-theme="light"] #sidebar{background:rgba(240,249,255,.7)}
.sb-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--muted);cursor:none;transition:all .2s;position:relative}
.sb-icon:hover,.sb-icon.active{background:rgba(14,165,233,.1);color:var(--blue)}
.sb-icon.active::before{content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:2px;height:18px;background:var(--blue);border-radius:0 2px 2px 0}

/* ── MAIN ── */
#main{grid-area:main;display:grid;grid-template-rows:34px 1fr auto;overflow:hidden}

/* ── TABBAR ── */
#tabbar{display:flex;align-items:stretch;background:rgba(6,21,36,.8);border-bottom:1px solid var(--edge);overflow-x:auto;overflow-y:hidden;scrollbar-width:none;transition:background .5s}
[data-theme="light"] #tabbar{background:rgba(224,242,254,.7)}
#tabbar::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:7px;padding:0 14px;min-width:110px;max-width:170px;white-space:nowrap;font-size:.76rem;font-weight:500;color:var(--muted);cursor:none;border-right:1px solid var(--edge);transition:all .2s;position:relative;flex-shrink:0}
.tab:hover{color:var(--text);background:rgba(14,165,233,.05)}
.tab.active{color:var(--text);background:var(--panel);border-bottom:2px solid var(--blue)}
[data-theme="light"] .tab.active{background:var(--surface)}
.lang-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0}
.tab-name{flex:1;overflow:hidden;text-overflow:ellipsis}
.tab-add{width:34px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:none;flex-shrink:0;transition:color .2s}
.tab-add:hover{color:var(--blue)}

/* ── EDITOR ── */
#editor-section{display:flex;flex-direction:column;overflow:hidden}
#editor-wrap{flex:1;display:grid;grid-template-columns:44px 1fr;overflow:auto;background:var(--panel);transition:background .5s}
#line-numbers{padding:14px 8px 14px 0;text-align:right;background:var(--panel);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:21px;user-select:none;border-right:1px solid var(--edge);position:sticky;left:0;z-index:2;transition:background .5s}
.ln{height:21px;display:block;padding-right:8px;transition:color .1s}
.ln.active{color:var(--blue)}
#code{background:transparent;color:var(--text);border:none;outline:none;padding:14px 18px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:21px;resize:none;min-height:100%;tab-size:4;white-space:pre;overflow-wrap:normal;overflow-x:auto;cursor:none;caret-color:var(--blue);width:100%;user-select:text}
#code::selection{background:rgba(14,165,233,.22)}

/* ── RESIZER ── */
#resizer{height:5px;background:var(--edge);cursor:ns-resize;flex-shrink:0;transition:background .2s;position:relative}
#resizer:hover,#resizer.dragging{background:var(--blue)}
#resizer::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:28px;height:2px;background:var(--blue);border-radius:2px;opacity:.3}

/* ── OUTPUT ── */
#output-panel{display:flex;flex-direction:column;background:#030e18;overflow:hidden;flex-shrink:0;transition:background .5s}
[data-theme="light"] #output-panel{background:#f0f9ff}
#output-header{display:flex;align-items:center;gap:8px;padding:0 14px;height:30px;background:rgba(7,18,26,.8);border-top:1px solid var(--edge);border-bottom:1px solid var(--edge);flex-shrink:0;transition:background .5s}
[data-theme="light"] #output-header{background:rgba(224,242,254,.8)}
.output-title{font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.out-actions{display:flex;gap:3px;margin-left:auto}
.out-btn{padding:3px 9px;background:transparent;border:1px solid transparent;border-radius:50px;color:var(--muted);font-size:.72rem;font-family:'DM Sans',sans-serif;cursor:none;transition:all .2s;display:flex;align-items:center;gap:4px}
.out-btn:hover{border-color:var(--edge);color:var(--text);background:rgba(14,165,233,.07)}
.out-btn.run-btn{background:rgba(14,165,233,.12);border:1px solid rgba(14,165,233,.35);color:var(--blue);font-family:'Syne',sans-serif;font-weight:700}
.out-btn.run-btn:hover{background:rgba(14,165,233,.22);border-color:rgba(14,165,233,.6);box-shadow:0 2px 12px rgba(14,165,233,.25)}
#terminal{flex:1;overflow-y:auto;padding:10px 16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.65;scrollbar-width:thin;scrollbar-color:var(--edge) transparent}
#terminal::-webkit-scrollbar{width:5px}
#terminal::-webkit-scrollbar-thumb{background:var(--edge);border-radius:3px}
.term-line{display:flex;align-items:flex-start;margin-bottom:2px}
.term-pre{color:var(--muted);flex-shrink:0;padding-right:10px;width:16px;text-align:right}
.term-txt{flex:1;word-break:break-word;white-space:pre-wrap}
.term-txt.stdout{color:var(--text)}
.term-txt.stderr{color:#f87171}
.term-txt.info{color:var(--blue)}
.term-txt.success{color:#22d3a4}
.term-txt.echo{color:var(--cyan)}

/* ── INPUT ROW ── */
#input-row{display:none;align-items:center;padding:6px 16px 8px;gap:10px;border-top:1px solid var(--edge);background:rgba(6,182,212,.05);flex-shrink:0}
#input-row.visible{display:flex}
.input-prompt{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--cyan);flex-shrink:0;white-space:nowrap}
#term-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12.5px;caret-color:var(--cyan);cursor:none;user-select:text}
#term-input::placeholder{color:var(--muted);opacity:.5}
#input-submit{padding:5px 14px;background:transparent;border:1px solid rgba(14,165,233,.35);border-radius:50px;color:var(--blue);font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;cursor:none;transition:all .2s;flex-shrink:0}
#input-submit:hover{background:rgba(14,165,233,.12);border-color:rgba(14,165,233,.7);box-shadow:0 4px 18px rgba(14,165,233,.25)}

/* ── STATUS BAR ── */
#statusbar{grid-area:status;display:flex;align-items:center;padding:0 14px;gap:12px;background:var(--blue);font-family:'DM Sans',sans-serif;font-size:.68rem;color:#001828;z-index:50}
.sbi{display:flex;align-items:center;gap:4px}
.sb-sep{opacity:.35}
#sb-status{margin-left:auto;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.5px}
#sb-author{font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem;opacity:.85}

/* ── LOADING ── */
#lo{position:fixed;inset:0;background:#071e30;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:28px;transition:opacity .5s ease}
#lo.gone{opacity:0;pointer-events:none}
.lo-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-.5px;color:var(--sky)}
.lo-brand .hl{background:linear-gradient(130deg,var(--sky3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lo-sub{font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:4px;color:var(--cyan);opacity:.7}
.lo-author{font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--muted)}
.lo-author strong{font-weight:600;color:var(--sky3)}
.lo-bar-wrap{width:220px;height:2px;background:rgba(14,165,233,.15);border-radius:2px;overflow:hidden}
.lo-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;animation:lo-go 3.5s ease-in-out forwards}
@keyframes lo-go{0%{width:0}60%{width:75%}100%{width:100%}}
.lo-msg{font-size:.76rem;color:var(--muted);font-family:'DM Sans',sans-serif}

/* ── TOAST ── */
#toast{position:fixed;bottom:36px;right:22px;padding:8px 18px;background:rgba(7,18,26,.92);border:1px solid rgba(14,165,233,.35);border-radius:50px;color:var(--sky);font-family:'DM Sans',sans-serif;font-size:.76rem;z-index:9990;opacity:0;transform:translateY(6px);transition:opacity .22s,transform .22s;pointer-events:none;backdrop-filter:blur(14px)}
#toast.show{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--edge);border-radius:4px}
@media(max-width:768px){#sidebar{display:none}#app{grid-template-columns:0 1fr}.brand-sub{display:none}}

/* ══ MASCOT CSS ══════════════════════════════════════════════════ */
#bav-root{position:fixed;inset:0;pointer-events:none;z-index:9998}
#bav-wrap{position:absolute;width:64px;pointer-events:auto;user-select:none;cursor:none;will-change:left,top}
.bav-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(14,165,233,.22);pointer-events:none;animation:bav-ring 3s ease-in-out infinite}
.bav-ring:nth-child(2){animation-delay:-1s}
@keyframes bav-ring{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:0;transform:scale(1.18)}}
#bav-shadow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:6px;background:radial-gradient(ellipse,rgba(14,165,233,.45) 0%,transparent 70%);border-radius:50%;pointer-events:none;transition:width .15s,opacity .15s}
#bav-anim{width:64px;height:84px;transform-origin:50% 100%;display:block}
@keyframes bav-idle{0%,100%{transform:translateY(0) rotate(-2deg) scaleY(1)}30%{transform:translateY(-6px) rotate(0deg) scaleY(1.02)}65%{transform:translateY(-3px) rotate(2deg) scaleY(1)}}
@keyframes bav-walk{0%,100%{transform:translateY(0) rotate(-7deg) scaleX(.96)}25%{transform:translateY(-9px) rotate(-2deg) scaleX(1)}50%{transform:translateY(0) rotate(7deg) scaleX(.96)}75%{transform:translateY(-9px) rotate(2deg) scaleX(1)}}
@keyframes bav-sit{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-3px) scaleY(1.03)}}
@keyframes bav-legswing-l{0%{transform:rotate(-28deg)}50%{transform:rotate(20deg)}100%{transform:rotate(-28deg)}}
@keyframes bav-legswing-r{0%{transform:rotate(20deg)}50%{transform:rotate(-28deg)}100%{transform:rotate(20deg)}}
#bav-leg-l.swinging{animation:bav-legswing-l 1.6s cubic-bezier(.45,0,.55,1) infinite}
#bav-leg-r.swinging{animation:bav-legswing-r 1.6s cubic-bezier(.45,0,.55,1) infinite}
@keyframes bav-squish{0%{transform:scaleX(1) scaleY(1)}15%{transform:scaleX(1.55) scaleY(.52)}50%{transform:scaleX(.84) scaleY(1.28)}80%{transform:scaleX(1.06) scaleY(.96)}100%{transform:scaleX(1) scaleY(1)}}
#bav-bubble{position:absolute;bottom:calc(100% + 11px);left:50%;transform:translateX(-50%) scale(.65);transform-origin:50% 100%;background:rgba(5,24,40,.92);backdrop-filter:blur(18px);border:1px solid rgba(14,165,233,.55);border-radius:14px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:500;color:#e0f2fe;white-space:nowrap;pointer-events:none;opacity:0;box-shadow:0 0 22px rgba(14,165,233,.25);transition:transform .38s cubic-bezier(.34,1.56,.64,1),opacity .26s ease;z-index:3}
#bav-bubble.on{transform:translateX(-50%) scale(1);opacity:1}
#bav-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:rgba(14,165,233,.55)}
#bav-bubble::before{content:'';position:absolute;top:calc(100% + 1px);left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:rgba(5,24,40,.92);z-index:1}
#bav-toggle{position:fixed;bottom:28px;left:28px;z-index:9999;width:38px;height:38px;border-radius:50%;background:rgba(5,24,40,.75);border:1.5px solid rgba(14,165,233,.3);box-shadow:0 2px 16px rgba(0,0,0,.3);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;font-size:1.05rem;cursor:pointer;pointer-events:auto;touch-action:manipulation;transition:transform .2s,box-shadow .2s,border-color .2s,background .3s}
#bav-toggle:hover{transform:scale(1.12);border-color:rgba(14,165,233,.65);box-shadow:0 4px 20px rgba(14,165,233,.3)}
[data-theme="light"] #bav-toggle{background:rgba(240,249,255,.88);border-color:rgba(14,165,233,.35)}
#bav-popover{position:fixed;bottom:76px;left:20px;z-index:9999;background:rgba(5,24,40,.9);backdrop-filter:blur(22px);border:1px solid rgba(14,165,233,.28);border-radius:16px;padding:10px;font-family:'DM Sans',sans-serif;transform-origin:bottom left;transform:scale(.8) translateY(8px);opacity:0;transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .18s ease;pointer-events:none}
#bav-popover.open{transform:scale(1) translateY(0);opacity:1;pointer-events:auto}
[data-theme="light"] #bav-popover{background:rgba(240,249,255,.95);border-color:rgba(14,165,233,.35)}
.bav-pop-label{font-size:9.5px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:rgba(125,211,252,.45);padding:2px 6px 8px;user-select:none;display:block}
#bav-action-btn{display:flex;align-items:center;gap:8px;border:none;border-radius:12px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s,background .25s,border-color .25s,color .25s;pointer-events:auto;white-space:nowrap;min-width:148px;justify-content:center}
#bav-action-btn:hover{transform:translateY(-1px)}
#bav-action-btn:active{transform:scale(.96)}
#bav-action-btn:disabled{opacity:.35;pointer-events:none}
#bav-action-btn.mode-delete{background:rgba(220,38,38,.14);border:1px solid rgba(239,68,68,.32);color:#fca5a5}
#bav-action-btn.mode-delete:hover{background:rgba(220,38,38,.26);box-shadow:0 4px 18px rgba(239,68,68,.26)}
#bav-action-btn.mode-spawn{background:rgba(14,165,233,.14);border:1px solid rgba(14,165,233,.38);color:#7dd3fc}
#bav-action-btn.mode-spawn:hover{background:rgba(14,165,233,.26);box-shadow:0 4px 18px rgba(14,165,233,.3)}
#bav-blackhole{position:fixed;pointer-events:none;z-index:9997;opacity:0;border-radius:50%}

<script>
/* ═══ CURSOR ═══════════════════════════════════════════════ */
(function(){
  const isMob=('ontouchstart' in window)||window.innerWidth<=768;
  const cd=document.getElementById('cd'),cr=document.getElementById('cr');
  if(!isMob){
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cd.style.left=mx+'px';cd.style.top=my+'px'});
    (function t(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(t)})();
    function addHov(s){document.querySelectorAll(s).forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'))})}
    addHov('button,a,.tab,.sb-icon,.out-btn,.hbtn,.dial-mini,#bav-wrap,.run-btn');
  }
})();

/* ═══ THEME ════════════════════════════════════════════════ */
function toggleTheme(){
  const html=document.documentElement,isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('ti').textContent=isDark?'☀️':'🌙';
}

/* ═══ TOAST ════════════════════════════════════════════════ */
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ═══ PYODIDE ══════════════════════════════════════════════ */
let pyodide=null,pyodideReady=null;
const loMsg=document.getElementById('lo-msg'),overlay=document.getElementById('lo');

async function initPyodide(){
  loMsg.textContent='Loading Python runtime…';
  pyodide = await loadPyodide({
    indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/',
    stdout: (text) => { if(text!==undefined&&text!=='') writeLine(text,'stdout'); },
    stderr: (text) => { if(text!==undefined&&text!=='') writeLine(text,'stderr'); }
  });
  loMsg.textContent='Ready!';
  setTimeout(()=>overlay.classList.add('gone'),400);
  setStatus('Ready');
}
pyodideReady=initPyodide().catch(err=>{loMsg.textContent='Failed: '+err;setStatus('Engine Error');});

function setStatus(msg){document.getElementById('sb-status').textContent=msg;}

/* ═══ TERMINAL ═════════════════════════════════════════════ */
const terminal=document.getElementById('terminal');
function writeLine(txt,cls){
  if(txt===null||txt===undefined||txt==='')return;
  const icons={stderr:'✕',info:'›',success:'✔',echo:'←',stdout:' ',warn:'!'};
  const d=document.createElement('div');d.className='term-line';
  const p=document.createElement('span');p.className='term-pre';p.textContent=icons[cls]||' ';
  const s=document.createElement('span');s.className='term-txt '+(cls||'stdout');s.textContent=txt;
  d.appendChild(p);d.appendChild(s);terminal.appendChild(d);terminal.scrollTop=terminal.scrollHeight;
  // ── SIX SEVEN EASTER EGG ──────────────────────────────────
  if(cls==='stdout'){
    const norm=txt.trim().toLowerCase().replace(/\s+/g,'');
    if(norm==='sixseven'||norm==='67'){
      triggerSixSeven();
    }
  }
}
function clearOutput(){terminal.innerHTML='';toast('Terminal cleared');}

/* ═══ SIX SEVEN EASTER EGG ════════════════════════════════ */
function triggerSixSeven(){
  new Audio('sixseven.mp3').play().catch(()=>{});
  // Inject keyframes once
  if(!document.getElementById('sz-style')){
    const st=document.createElement('style');st.id='sz-style';
    st.textContent=`
      @keyframes sz-fade-in{from{opacity:0}to{opacity:1}}
      @keyframes sz-pop{from{transform:scale(.3) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
      @keyframes sz-txt-in{from{transform:translateY(-18px);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes sz-txt-bot{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
      .sz-top-txt{font-family:Impact,Arial Black,sans-serif;font-size:clamp(1.4rem,4vw,2.2rem);color:#fff;
        text-align:center;letter-spacing:3px;text-transform:uppercase;
        text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000,0 0 20px rgba(14,165,233,.8);
        animation:sz-txt-in .38s cubic-bezier(.34,1.56,.64,1) .1s both}
      .sz-bot-txt{font-family:Impact,Arial Black,sans-serif;font-size:clamp(2rem,6vw,3.6rem);color:#fff;
        text-align:center;letter-spacing:4px;text-transform:uppercase;
        text-shadow:-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000,3px 3px 0 #000,0 0 30px rgba(14,165,233,1),0 0 60px rgba(6,182,212,.6);
        animation:sz-txt-bot .38s cubic-bezier(.34,1.56,.64,1) .22s both}
    `;
    document.head.appendChild(st);
  }
  // Overlay
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999999;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:sz-fade-in .2s ease;backdrop-filter:blur(4px)';
  // Card
  const box=document.createElement('div');
  box.style.cssText='display:flex;flex-direction:column;align-items:center;gap:10px;animation:sz-pop .36s cubic-bezier(.34,1.56,.64,1);max-width:min(500px,92vw)';
  // Top text
  const topTxt=document.createElement('div');
  topTxt.className='sz-top-txt';
  topTxt.textContent='WHEN SOMEONE SAYS';
  // GIF image — try the bigfooty full URL, fallback to canvas
  const img=document.createElement('img');
  img.style.cssText='width:100%;max-width:min(480px,90vw);max-height:55vh;object-fit:contain;border-radius:10px;border:3px solid #0ea5e9;box-shadow:0 0 50px rgba(14,165,233,.7),0 0 100px rgba(14,165,233,.3);display:block;animation:sz-pop .36s cubic-bezier(.34,1.56,.64,1) .06s both';
  // Try the full-res GIF from bigfooty CDN
  img.src='67.gif';
  img.onerror=()=>{
    // Try alternate known 67 gif sources
    img.onerror=()=>{ img.replaceWith(buildFallbackCanvas()); };
    img.src='https://media.tenor.com/QvNc4gEjUj4AAAAM/sixty-seven-67.gif';
  };
  // Bottom text
  const botTxt=document.createElement('div');
  botTxt.className='sz-bot-txt';
  botTxt.textContent='SIX SEVEN ⁶🤷⁷';
  // Hint
  const hint=document.createElement('div');
  hint.style.cssText='font-family:DM Sans,sans-serif;font-size:.76rem;color:rgba(255,255,255,.4);letter-spacing:1px;margin-top:4px';
  hint.textContent='click anywhere or press Esc to close';
  box.appendChild(topTxt);box.appendChild(img);box.appendChild(botTxt);box.appendChild(hint);
  overlay.appendChild(box);
  overlay.addEventListener('click',()=>overlay.remove());
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){overlay.remove();document.removeEventListener('keydown',esc);}});
  document.body.appendChild(overlay);
}
function buildFallbackCanvas(){
  // Animated canvas — bouncing 67 with meme-style text
  const c=document.createElement('canvas');c.width=460;c.height=300;
  c.style.cssText='border-radius:10px;border:3px solid #0ea5e9;box-shadow:0 0 50px rgba(14,165,233,.7);width:100%;max-width:min(460px,90vw)';
  const ctx=c.getContext('2d');
  let t=0;
  function draw(){
    ctx.clearRect(0,0,460,300);
    // BG gradient
    const g=ctx.createLinearGradient(0,0,460,300);
    g.addColorStop(0,'#030e18');g.addColorStop(1,'#0c2d48');
    ctx.fillStyle=g;ctx.fillRect(0,0,460,300);
    // Pulsing glow rings
    const pulse=Math.sin(t*.08);
    ctx.beginPath();ctx.arc(230,150,80+pulse*8,0,Math.PI*2);
    ctx.strokeStyle=`rgba(14,165,233,${0.15+pulse*.08})`;ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(230,150,110+pulse*6,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,182,212,${0.08+pulse*.05})`;ctx.lineWidth=1.5;ctx.stroke();
    // Big 67 with bounce
    const bounce=Math.abs(Math.sin(t*.05))*12;
    ctx.save();ctx.translate(230,150-bounce);
    ctx.font='bold 130px Impact,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.lineWidth=10;ctx.strokeStyle='#000';ctx.strokeText('67',0,0);
    // Gradient fill for 67
    const gf=ctx.createLinearGradient(0,-65,0,65);
    gf.addColorStop(0,'#bae6fd');gf.addColorStop(0.5,'#0ea5e9');gf.addColorStop(1,'#0369a1');
    ctx.fillStyle=gf;ctx.fillText('67',0,0);
    ctx.restore();
    t++;requestAnimationFrame(draw);
  }
  draw();
  return c;
}

/* ═══ INLINE INPUT SYSTEM (Thonny-style) ════════════════════ */
// The input-row div is kept for fallback but we primarily use inline terminal input
const inputRow=document.getElementById('input-row');
const termInput=document.getElementById('term-input');
const ipl=document.getElementById('ipl');

// Active inline input line DOM elements
let _inlineInputEl=null;
let _inlineResolve=null;

function createInlineInput(promptText){
  return new Promise(function(resolve){
    _inlineResolve=resolve;

    // Build an inline input line in the terminal
    const line=document.createElement('div');
    line.className='term-line';
    line.style.alignItems='center';

    // The prompt text (cyan, like Thonny)
    const promptSpan=document.createElement('span');
    promptSpan.className='term-txt echo';
    promptSpan.style.cssText='flex:0 0 auto;white-space:pre;margin-right:0;color:var(--cyan)';
    promptSpan.textContent=promptText||'';

    // The editable input field — looks like plain terminal text
    const inputEl=document.createElement('input');
    inputEl.type='text';
    inputEl.autocomplete='off';
    inputEl.spellcheck=false;
    inputEl.style.cssText=[
      'flex:1','background:transparent','border:none','outline:none',
      'color:var(--text)','font-family:\'JetBrains Mono\',monospace',
      'font-size:12.5px','caret-color:var(--cyan)','padding:0','margin:0',
      'min-width:60px','cursor:text'
    ].join(';');

    _inlineInputEl=inputEl;

    inputEl.addEventListener('keydown',function(e){
      if(e.key==='Enter'){
        e.preventDefault();
        const val=inputEl.value;
        // Freeze the input: replace with plain text
        line.innerHTML='';
        const frozenPre=document.createElement('span');frozenPre.className='term-pre';frozenPre.textContent=' ';
        const frozenTxt=document.createElement('span');
        frozenTxt.className='term-txt stdout';
        frozenTxt.textContent=(promptText||'')+val;
        line.appendChild(frozenPre);line.appendChild(frozenTxt);
        _inlineInputEl=null;
        // Hide the fallback row just in case
        inputRow.classList.remove('visible');
        const res=_inlineResolve;_inlineResolve=null;
        if(res) res(val);
      }
      // Block Ctrl+C to avoid confusing the running state
      if(e.ctrlKey&&e.key==='c'){e.preventDefault();}
    });

    // Blank pre-icon column
    const pre=document.createElement('span');
    pre.className='term-pre';pre.textContent=' ';

    line.appendChild(pre);
    line.appendChild(promptSpan);
    line.appendChild(inputEl);
    terminal.appendChild(line);
    terminal.scrollTop=terminal.scrollHeight;
    // Use setTimeout so Pyodide yields the event loop before we grab focus
    setTimeout(()=>{ inputEl.focus(); }, 50);
  });
}

/* ═══ RUN CODE ══════════════════════════════════════════════ */
let isRunning=false;

async function runCode(){
  if(isRunning){toast('Already running…');return;}
  await pyodideReady;
  if(!pyodide){toast('Engine not ready yet…');return;}

  const userCode=document.getElementById('code').value;
  isRunning=true;
  setStatus('Running…');
  _inlineResolve=null;
  _inlineInputEl=null;
  inputRow.classList.remove('visible');
  clearOutput();
  writeLine('Execution started','info');

  window.__beaconInput = function(promptStr){
    return createInlineInput(promptStr);
  };

  pyodide.globals.set('__user_code__', userCode);

  try{
    await pyodide.runPythonAsync(`
import builtins, js

async def __beacon_input__(prompt=""):
    p = str(prompt) if prompt is not None else ""
    result = await js.window.__beaconInput(p)
    return str(result) if result is not None else ""

builtins.input = __beacon_input__

_code = __user_code__
_lines = _code.split("\\n")
_indented = "\\n".join("    " + ln for ln in _lines)
_src = "async def __run__():\\n" + (_indented if _code.strip() else "    pass")
_ns = {"__name__": "__main__"}
exec(compile(_src, "<beacon>", "exec"), _ns)
try:
    await _ns["__run__"]()
except SystemExit:
    pass
`);
    writeLine('Done ✔','success');
    setStatus('Ready');
  }catch(err){
    // Clean up any hanging inline input
    if(_inlineInputEl){
      try{_inlineInputEl.closest('.term-line').remove();}catch(_){}
      _inlineInputEl=null;
    }
    if(_inlineResolve){_inlineResolve('');_inlineResolve=null;}
    writeLine(String(err),'stderr');
    setStatus('Error');
  }

  isRunning=false;
  _inlineResolve=null;
  _inlineInputEl=null;
  inputRow.classList.remove('visible');
}

/* ═══ LINE NUMBERS ══════════════════════════════════════════ */
const codeEl=document.getElementById('code');
const LN=document.getElementById('line-numbers');
function updateLN(){
  const n=codeEl.value.split('\n').length;let h='';
  for(let i=1;i<=n;i++) h+=`<span class="ln" id="ln${i}">${i}</span>`;
  LN.innerHTML=h;updateAL();
}
function updateAL(){
  const pos=codeEl.selectionStart,before=codeEl.value.substring(0,pos);
  const ln=before.split('\n').length,col=pos-before.lastIndexOf('\n');
  document.querySelectorAll('.ln').forEach(e=>e.classList.remove('active'));
  const a=document.getElementById('ln'+ln);if(a)a.classList.add('active');
  document.getElementById('sb-ln').textContent=`Ln ${ln}, Col ${col}`;
  document.getElementById('sb-chars').textContent=codeEl.value.length+' chars';
}
codeEl.addEventListener('input',updateLN);
codeEl.addEventListener('keyup',updateAL);
codeEl.addEventListener('click',updateAL);
codeEl.addEventListener('scroll',()=>{LN.style.marginTop=(-codeEl.scrollTop)+'px';});
codeEl.addEventListener('keydown',e=>{
  /* ── TAB: insert 4 spaces ── */
  if(e.key==='Tab'){
    e.preventDefault();
    const s=codeEl.selectionStart,end=codeEl.selectionEnd;
    if(s===end){
      // No selection: insert 4 spaces
      codeEl.value=codeEl.value.substring(0,s)+'    '+codeEl.value.substring(end);
      codeEl.selectionStart=codeEl.selectionEnd=s+4;
    } else {
      // Selection: indent each selected line
      const before=codeEl.value.substring(0,s),sel=codeEl.value.substring(s,end),after=codeEl.value.substring(end);
      const indented=sel.replace(/^/gm,'    ');
      codeEl.value=before+indented+after;
      codeEl.selectionStart=s;codeEl.selectionEnd=s+indented.length;
    }
    updateLN();
    return;
  }

  /* ── ENTER: smart auto-indent ── */
  if(e.key==='Enter'){
    e.preventDefault();
    const s=codeEl.selectionStart;
    const val=codeEl.value;
    // Get current line
    const lineStart=val.lastIndexOf('\n',s-1)+1;
    const curLine=val.substring(lineStart,s);
    // Match leading whitespace
    const leadMatch=curLine.match(/^(\s*)/);
    let indent=leadMatch?leadMatch[1]:'';
    // If line ends with ':', add one level of indent
    const trimmed=curLine.trimEnd();
    if(trimmed.endsWith(':')){
      indent+=('    ');
    }
    // If current line is only whitespace (blank indent line), reduce indent (like Thonny/Replit)
    // Insert newline + indent
    const ins='\n'+indent;
    codeEl.value=val.substring(0,s)+ins+val.substring(codeEl.selectionEnd);
    codeEl.selectionStart=codeEl.selectionEnd=s+ins.length;
    updateLN();
    updateAL();
    return;
  }

  /* ── BACKSPACE: dedent if cursor is on indent whitespace ── */
  if(e.key==='Backspace'){
    const s=codeEl.selectionStart,end=codeEl.selectionEnd;
    if(s===end && s>0){
      const val=codeEl.value;
      const lineStart=val.lastIndexOf('\n',s-1)+1;
      const beforeCursor=val.substring(lineStart,s);
      // If everything before cursor on this line is spaces, delete a full indent (up to 4)
      if(/^ +$/.test(beforeCursor)){
        e.preventDefault();
        const del=Math.min(4, beforeCursor.length % 4 === 0 ? 4 : beforeCursor.length % 4);
        codeEl.value=val.substring(0,s-del)+val.substring(s);
        codeEl.selectionStart=codeEl.selectionEnd=s-del;
        updateLN();
        updateAL();
        return;
      }
    }
  }

  /* ── Ctrl/Cmd+Enter: run ── */
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCode();return;}

  /* ── Auto-close brackets and smart quotes ── */
  const OPENERS={'(':')','{':'}','[':']'};
  const CLOSERS=new Set([')','}',']']);
  const QUOTES=new Set(['"',"'"]);

  const val=codeEl.value;
  const s=codeEl.selectionStart, end=codeEl.selectionEnd;
  const nextCh=val[s]||'';
  const prevCh=val[s-1]||'';

  // ── Brackets: auto-close ──
  if(OPENERS[e.key]){
    e.preventDefault();
    const close=OPENERS[e.key];
    if(s!==end){
      // Wrap selection in brackets
      const sel=val.substring(s,end);
      codeEl.value=val.substring(0,s)+e.key+sel+close+val.substring(end);
      codeEl.selectionStart=s+1; codeEl.selectionEnd=end+1;
    } else {
      codeEl.value=val.substring(0,s)+e.key+close+val.substring(s);
      codeEl.selectionStart=codeEl.selectionEnd=s+1;
    }
    updateLN(); return;
  }

  // ── Closing bracket: skip over if it's already there ──
  if(CLOSERS.has(e.key)){
    if(nextCh===e.key){
      e.preventDefault();
      codeEl.selectionStart=codeEl.selectionEnd=s+1;
      return;
    }
    // Otherwise let browser insert normally
    return;
  }

  // ── Smart quotes ──
  if(QUOTES.has(e.key)){
    const q=e.key;

    // 1. Skip over existing closing quote
    if(nextCh===q && prevCh!==q){
      e.preventDefault();
      codeEl.selectionStart=codeEl.selectionEnd=s+1;
      return;
    }

    // 2. If there's a selection, wrap it
    if(s!==end){
      e.preventDefault();
      const sel=val.substring(s,end);
      codeEl.value=val.substring(0,s)+q+sel+q+val.substring(end);
      codeEl.selectionStart=s+1; codeEl.selectionEnd=end+1;
      updateLN(); return;
    }

    // 3. Don't auto-close if prev char is alphanumeric or closing (e.g. it's a real apostrophe in a word)
    if(/[\w\)]/.test(prevCh)){
      // Just let the browser type the single quote normally
      return;
    }

    // 4. Don't auto-close if next char is alphanumeric (cursor is inside a word)
    if(/\w/.test(nextCh)){
      return;
    }

    // 5. Don't auto-close if we're already inside this quote type
    // Count unescaped occurrences of this quote before cursor
    const before=val.substring(0,s);
    let qCount=0;
    for(let i=0;i<before.length;i++){
      if(before[i]===q && (i===0||before[i-1]!=='\\')){qCount++;}
    }
    // Odd count = inside a string, just insert the quote to close it
    // Even count = not inside, auto-close
    if(qCount%2===1){
      // Inside string — just type it, don't double
      return;
    }

    // 6. Auto-close: insert quote pair
    e.preventDefault();
    codeEl.value=val.substring(0,s)+q+q+val.substring(s);
    codeEl.selectionStart=codeEl.selectionEnd=s+1;
    updateLN(); return;
  }
});
updateLN();

  document.addEventListener('mousemove',e=>{if(!dragging)return;const dx=e.clientX-lastDX;lastDX=e.clientX;dSwayT=Math.max(-38,Math.min(38,-dx*3.2));px=e.clientX-dragOX;py=e.clientY-dragOY;mHist.push({x:e.clientX,y:e.clientY,t:performance.now()});if(mHist.length>10)mHist.shift();dSway+=(dSwayT-dSway)*.28;dSwayT*=.82;animEl.style.transform=`rotate(${dSway.toFixed(1)}deg)`;applyPos();});
  document.addEventListener('mouseup',()=>{if(!dragging)return;dragging=false;dSwayT=0;setExpr('happy');const now=performance.now(),rec=mHist.filter(p=>now-p.t<130);if(rec.length>=2){const a=rec[0],b=rec[rec.length-1],dT=Math.max(b.t-a.t,5)/16.67;vx=Math.max(-MAX,Math.min(MAX,((b.x-a.x)/dT)*.62));vy=Math.max(-MAX,Math.min(MAX,((b.y-a.y)/dT)*.62));}mode='flying';prev='';});
  wrap.addEventListener('dblclick',()=>{const msgs=["I'm Beacon! 🛡️","UAE's guardian! 🇦🇪","Anshuman coded me! 💻","Hello friend! 👋","Building unity! 🤝"];showBubble(msgs[Math.floor(Math.random()*msgs.length)],3000);if(!dragging){vy=-12-Math.random()*3;vx=(Math.random()-.5)*9;mode='flying';prev='';squish();}});

  // Eye tracking
  if(!('ontouchstart' in window)&&window.innerWidth>768){
    let cX=window.innerWidth/2,cY=window.innerHeight/2;
    document.addEventListener('mousemove',e=>{cX=e.clientX;cY=e.clientY;});
    const pL=document.getElementById('bav-pupil-l'),iL=document.getElementById('bav-iris-l');
    const pR=document.getElementById('bav-pupil-r'),iR=document.getElementById('bav-iris-r');
    const EL={x:23,y:38},ER={x:41,y:38},MT=2.6;
    function trackEyes(){if(dragging){requestAnimationFrame(trackEyes);return;}const r=wrap.getBoundingClientRect(),sc=r.width/64;function mv(ec,pu,ir){const ex=r.left+ec.x*sc,ey=r.top+ec.y*sc,dx=cX-ex,dy=cY-ey,d=Math.sqrt(dx*dx+dy*dy)||1,ratio=Math.min(MT,d)/d,ox=dx*ratio*(flipped?-1:1)/sc,oy=dy*ratio/sc;pu.setAttribute('cx',ec.x+ox);pu.setAttribute('cy',ec.y+oy);ir.setAttribute('cx',ec.x+ox*.55);ir.setAttribute('cy',ec.y+oy*.55);}mv(EL,pL,iL);mv(ER,pR,iR);requestAnimationFrame(trackEyes);}
    trackEyes();
  }

  // Delete / Spawn
  function doDelete(){actionBtn.disabled=true;const cx=px+32,cy=py+42,SIZE=220;bhCanvas.width=SIZE;bhCanvas.height=SIZE;bhCanvas.style.left=(cx-SIZE/2)+'px';bhCanvas.style.top=(cy-SIZE/2)+'px';bhCanvas.style.opacity='1';const ctx=bhCanvas.getContext('2d');const msL=px,msT=py;const GROW=600,HOLD=400,SHRINK=500,TOTAL=GROW+HOLD+SHRINK,start=performance.now();function eO(t){return 1-Math.pow(1-t,3)}function eI(t){return t*t*t}function dBH(r,a){ctx.clearRect(0,0,SIZE,SIZE);if(r<=0)return;const c=SIZE/2,g=ctx.createRadialGradient(c,c,0,c,c,r);g.addColorStop(0,'rgba(0,0,0,'+a+')');g.addColorStop(.5,'rgba(5,24,40,'+(a*.8)+')');g.addColorStop(.8,'rgba(14,165,233,'+(a*.35)+')');g.addColorStop(1,'rgba(14,165,233,0)');ctx.beginPath();ctx.arc(c,c,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
    function tick(now){const el=now-start;if(el<GROW){const p=eO(el/GROW),pu=eI(el/GROW);dBH(p*105,p);wrap.style.left=(msL+(cx-32-msL)*pu)+'px';wrap.style.top=(msT+(cy-42-msT)*pu)+'px';wrap.style.transform=`scale(${1-pu*.45}) rotate(${pu*700}deg)`;wrap.style.opacity=String(1-pu*.35);}else if(el<GROW+HOLD){const p=(el-GROW)/HOLD;dBH(105,1);wrap.style.left=(cx-32)+'px';wrap.style.top=(cy-42)+'px';wrap.style.transform=`scale(${Math.max(0,.55-p*.55)}) rotate(${700+p*380}deg)`;wrap.style.opacity=String(Math.max(0,1-p*1.4));}else if(el<TOTAL){wrap.style.visibility='hidden';const p=eI((el-GROW-HOLD)/SHRINK);dBH(105*(1-p),1-p);}else{ctx.clearRect(0,0,SIZE,SIZE);bhCanvas.style.opacity='0';wrap.style.visibility='hidden';window._bavPaused=false;setMode('spawn');return;}requestAnimationFrame(tick);}
    requestAnimationFrame(tick);
  }
  function doSpawn(){actionBtn.disabled=true;window._bavPaused=true;const sX=window.innerWidth*.5-32,sY=window.innerHeight*.65,bX=sX+32;Object.assign(wrap.style,{visibility:'visible',display:'block',opacity:'0',transform:'scale(0) rotate(-200deg)',left:sX+'px',top:sY+'px'});Object.assign(beaconRay.style,{left:bX+'px',height:'0px',opacity:'0',marginLeft:'-3px'});const BD=400,BH=280,MI=480,BF=360,TOTAL=BD+BH+MI+BF,start=performance.now();function eO(t){return 1-Math.pow(1-t,3)}
    function tick(now){const el=now-start;if(el<BD){const p=eO(el/BD),pu=4+Math.sin(el/38)*2.2;Object.assign(beaconRay.style,{height:(p*(sY+42))+'px',opacity:String(p*.95),width:pu+'px',marginLeft:(-pu/2)+'px'});}else if(el<BD+BH){const p=(el-BD)/BH,pu=5+Math.sin(el/28)*2.8;Object.assign(beaconRay.style,{width:pu+'px',marginLeft:(-pu/2)+'px',opacity:String(.9+Math.sin(el/55)*.1)});const mp=Math.max(0,(p-.25)/.75);if(mp>0){wrap.style.opacity=String(eO(mp)*.65);wrap.style.transform=`scale(${eO(mp)*.55}) rotate(${(1-mp)*-200}deg)`;}}else if(el<BD+BH+MI){const p=eO((el-BD-BH)/MI);wrap.style.opacity=String(.65+p*.35);wrap.style.transform=`scale(${.55+p*.45}) rotate(${(1-p)*-80}deg)`;beaconRay.style.opacity=String(1-p*.5);}else if(el<TOTAL){const p=(el-BD-BH-MI)/BF;wrap.style.opacity='1';wrap.style.transform='scale(1) rotate(0deg)';beaconRay.style.opacity=String(Math.max(0,.5-p));}else{beaconRay.style.opacity='0';beaconRay.style.height='0';wrap.style.opacity='1';wrap.style.transform='';px=sX;py=sY;window._bavPaused=false;setMode('delete');return;}requestAnimationFrame(tick);}
    requestAnimationFrame(tick);
  }
})();
