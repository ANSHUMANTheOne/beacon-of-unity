<!DOCTYPE html>
<html>
<head>
  <title>Beacon of Unity Code</title>

  <style>
    :root{
      --sky:#0ea5e9;
      --cyan:#06b6d4;
      --navy:#071e30;
      --deep:#0c2d48;
      --light:#e0f2fe;
    }

    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(180deg, var(--navy), var(--deep));
      color:var(--light);
    }

    .topbar{
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(12,45,72,0.7);
      border-bottom:1px solid rgba(224,242,254,0.1);
    }

    .brand{
      font-weight:bold;
      color:var(--sky);
      letter-spacing:0.5px;
    }

    textarea{
      width:100%;
      height:60vh;
      background:#061625;
      color:var(--light);
      border:none;
      padding:14px;
      font-size:14px;
      outline:none;
    }

    .controls{
      display:flex;
      gap:10px;
      margin:10px;
    }

    button{
      padding:10px 14px;
      background:linear-gradient(90deg,var(--sky),var(--cyan));
      border:none;
      cursor:pointer;
      font-weight:bold;
      border-radius:6px;
      color:#001018;
    }

    .output{
      height:25vh;
      background:#000;
      padding:12px;
      font-family:monospace;
      border-top:1px solid rgba(224,242,254,0.1);
      overflow:auto;
      white-space:pre-wrap;
    }

    .terminal-line{
      display:flex;
      align-items:center;
    }

    .terminal-line input{
      background:transparent;
      border:none;
      outline:none;
      color:white;
      font-family:monospace;
      margin-left:5px;
      flex:1;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="brand">Beacon of Unity Code</div>
</div>

<textarea id="code">print("Hello Beacon of Unity")</textarea>

<div class="controls">
  <button onclick="runCode()">Run</button>
</div>

<div class="output" id="output"></div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<script>

let pyodideReady = loadPyodide();

/* TERMINAL INPUT (INLINE, REAL FEEL) */
function terminalInput(promptText){
  return new Promise((resolve)=>{
    let output = document.getElementById("output");

    let line = document.createElement("div");
    line.className = "terminal-line";

    let promptSpan = document.createElement("span");
    promptSpan.textContent = promptText;

    let input = document.createElement("input");

    line.appendChild(promptSpan);
    line.appendChild(input);
    output.appendChild(line);

    input.focus();

    input.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        let val = input.value;

        // replace input with plain text
        line.removeChild(input);
        let textNode = document.createTextNode(val);
        line.appendChild(textNode);

        resolve(val);
      }
    });

    output.scrollTop = output.scrollHeight;
  });
}

/* PYTHON RUNNER */
async function runPyodide(code){
  let pyodide = await pyodideReady;

  pyodide.globals.set("terminal_input", terminalInput);

  await pyodide.runPythonAsync(`
import builtins
import asyncio

async def custom_input(prompt=""):
    return await terminal_input(prompt)

builtins.input = custom_input
  `);

  await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()

async def main():
    try:
        exec("""${code}""")
    except Exception as e:
        print(e)

import asyncio
asyncio.run(main())

output = sys.stdout.getvalue()
  `);

  return pyodide.globals.get("output");
}

/* RUN BUTTON */
async function runCode(){
  let code = document.getElementById("code").value;
  let outputBox = document.getElementById("output");

  outputBox.innerHTML = "";

  try{
    let result = await runPyodide(code);
    outputBox.innerHTML += result;
  }catch(err){
    outputBox.innerText = "Error: " + err;
  }
}

</script>

</body>
</html>
