<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub | Beacon of Unity</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8fafc; display: flex; color: #1e293b; }
        
        /* Sidebar Navigation */
        .sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; padding: 25px; position: fixed; }
        .sidebar h2 { font-size: 22px; font-weight: 800; color: #38bdf8; margin-bottom: 30px; letter-spacing: -0.5px; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #1e293b; }
        .nav-item.active { background: #38bdf8; color: #0f172a; font-weight: 600; }

        /* Main Content */
        .main-content { margin-left: 310px; padding: 40px; width: calc(100% - 310px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        
        /* Lost and Found Badges */
        .badge-lost { background: #fee2e2; color: #991b1b; }
        .badge-found { background: #dcfce7; color: #166534; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Existing Request Styling */
        .request-card { border-left: 5px solid #38bdf8; margin-bottom: 15px; }
        .urgency-high { border-left-color: #ef4444; }
        .btn-help { background: #38bdf8; color: #0f172a; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:white; width:90%; max-width:450px; padding:30px; border-radius:20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }

        .fab { position: fixed; bottom: 30px; right: 30px; background: #38bdf8; color: #0f172a; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; cursor: pointer; z-index: 999; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Beacon of Unity</h2>
        <div class="nav-item active" onclick="switchTab('community')">✨ Community Hub</div>
        <div class="nav-item" onclick="switchTab('lostfound')">🔍 Lost and Found</div>
        <div class="nav-item">📢 Updates</div>
        <div class="nav-item" id="logoutBtnNav" style="margin-top: 100px; opacity: 0.7;">Logout</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="pageTitle">Community Hub</h1>
            <button class="logout-btn" id="logoutBtn" style="background:#fee2e2; color:#991b1b; border:none; padding:10px 18px; border-radius:8px; cursor:pointer;">Logout</button>
        </div>

        <div class="content-grid">
            <div>
                <div id="communityTab" class="tab-content active">
                    <h3>Recent Requests</h3>
                    <div id="requestFeed"><p>Loading...</p></div>
                </div>

                <div id="lostFoundTab" class="tab-content">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3>Lost & Found Items</h3>
                        <button onclick="openLFModal()" style="background:#0f172a; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">+ Report Item</button>
                    </div>
                    <div id="lfFeed"><p>No items reported yet.</p></div>
                </div>
            </div>
            
            <div>
                <div class="card">
                    <h3>Active Conversations</h3>
                    <div id="activeChatsList" style="font-size: 13px; color: #64748b;"><p>No active chats.</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="lfModal" class="modal">
        <div class="modal-content">
            <h2>Report Lost/Found Item</h2>
            <label>I have...</label>
            <select id="lfType">
                <option value="Lost">Lost something</option>
                <option value="Found">Found something</option>
            </select>
            <label>Item Name</label><input type="text" id="lfItem" placeholder="e.g. Blue Wallet">
            <label>Location</label><input type="text" id="lfLoc" placeholder="Where was it last seen?">
            <label>Description</label><textarea id="lfDesc" placeholder="Describe the item..."></textarea>
            <button id="submitLFBtn" style="width:100%; padding:12px; background:#38bdf8; color:#0f172a; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Post Report</button>
            <button onclick="document.getElementById('lfModal').style.display='none'" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="chatPopup" style="display:none; position:fixed; bottom:20px; right:90px; width:320px; height:450px; background:white; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2); z-index:2000; flex-direction:column; border:1px solid #e2e8f0; overflow:hidden;">
        <div style="background:#0f172a; color:white; padding:12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleChatCollapse()">
            <span id="chatWith">Chat</span>
            <span id="collapseIcon">▼</span>
        </div>
        <div id="chatBody" style="flex:1; display:flex; flex-direction:column;">
            <div id="messageArea" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; background:#f8fafc;"></div>
            <div style="padding:10px; border-top:1px solid #e2e8f0;">
                <input type="text" id="msgInput" placeholder="Type a message..." style="width:80%;">
                <button id="sendMsgBtn">➔</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, arrayUnion, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNYQbkHf9yQqGzN9qNRePHxQ5Z1dgfeE",
            authDomain: "beaconofunityofficial.firebaseapp.com",
            projectId: "beaconofunityofficial",
            storageBucket: "beaconofunityofficial.firebasestorage.app",
            messagingSenderId: "37918398882",
            appId: "1:37918398882:web:205161bb147393f4defafb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- TAB SWITCHING ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            if(tab === 'community') {
                document.getElementById('communityTab').classList.add('active');
                document.getElementById('pageTitle').innerText = "Community Hub";
            } else {
                document.getElementById('lostFoundTab').classList.add('active');
                document.getElementById('pageTitle').innerText = "Lost and Found";
                loadLF();
            }
        };

        // --- LOST & FOUND LOGIC ---
        window.openLFModal = () => document.getElementById('lfModal').style.display = 'flex';

        document.getElementById('submitLFBtn').onclick = async () => {
            const type = document.getElementById('lfType').value;
            const item = document.getElementById('lfItem').value;
            const loc = document.getElementById('lfLoc').value;
            const desc = document.getElementById('lfDesc').value;

            if(!item || !loc) return alert("Please fill details");

            await addDoc(collection(db, "lostfound"), {
                type, item, location: loc, description: desc,
                userId: auth.currentUser.uid,
                userEmail: auth.currentUser.email,
                createdAt: serverTimestamp()
            });
            document.getElementById('lfModal').style.display = 'none';
        };

        function loadLF() {
            const q = query(collection(db, "lostfound"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('lfFeed');
                feed.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "card";
                    card.innerHTML = `
                        <span class="badge ${data.type === 'Lost' ? 'badge-lost' : 'badge-found'}">${data.type}</span>
                        <h4>${data.item}</h4>
                        <p style="font-size:13px;">📍 ${data.location}</p>
                        <p style="font-size:14px; color:#475569;">${data.description}</p>
                        <button onclick="startChat('${docSnap.id}', '${data.userId}', '${data.userEmail.split('@')[0]}', '${data.userId}')" 
                                style="background:#f1f5f9; border:1px solid #cbd5e1; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">
                            Contact Finder/Owner
                        </button>
                    `;
                    feed.appendChild(card);
                });
            });
        }

        // --- RE-USE YOUR EXISTING CHAT & FEED LOGIC BELOW ---
        // (Keep all your existing loadRequests, startChat, and onAuthStateChanged functions here)
        // Ensure you include the "censorText" function you added earlier!

    </script>
</body>
</html>
