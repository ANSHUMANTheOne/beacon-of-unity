<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub | Beacon of Unity</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8fafc; display: flex; color: #1e293b; }
        
        /* Sidebar Navigation */
        .sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; padding: 25px; position: fixed; }
        .sidebar h2 { font-size: 22px; font-weight: 800; color: #38bdf8; margin-bottom: 30px; letter-spacing: -0.5px; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #1e293b; }
        .nav-item.active { background: #38bdf8; color: #0f172a; font-weight: 600; }

        /* Main Content */
        .main-content { margin-left: 310px; padding: 40px; width: calc(100% - 310px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        
        /* Badges */
        .badge { font-size: 11px; padding: 4px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .badge-lost { background: #fee2e2; color: #991b1b; }
        .badge-found { background: #dcfce7; color: #166534; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .request-card { border-left: 5px solid #38bdf8; margin-bottom: 15px; }
        .btn-help { background: #38bdf8; color: #0f172a; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:white; width:90%; max-width:450px; padding:30px; border-radius:20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }

        #chatPopup { display:none; position:fixed; bottom:20px; right:90px; width:320px; height:450px; background:white; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2); z-index:2000; flex-direction:column; border:1px solid #e2e8f0; overflow:hidden; }

        /* Animation for notifications */
        @keyframes pulse-red {
            0% { background-color: #fff; border-color: #e2e8f0; }
            50% { background-color: #fff1f2; border-color: #ef4444; transform: scale(1.01); }
            100% { background-color: #fff; border-color: #e2e8f0; }
        }

        .new-message-blink {
            animation: pulse-red 1.5s infinite ease-in-out !important;
            border: 2px solid #ef4444 !important;
            z-index: 5;
        }

        .dot { height: 10px; width: 10px; background-color: #ef4444; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 5px rgba(239, 68, 68, 0.8); }

        .chat-list-item {
            padding: 12px;
            border: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            margin-bottom: 8px;
            background: white;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Beacon of Unity</h2>
        <div class="nav-item active" onclick="switchTab('community')">✨ Community Hub</div>
        <div class="nav-item" onclick="switchTab('lostfound')">🔍 Lost and Found</div>
        <div class="nav-item">📢 Updates</div>
        <div class="nav-item" id="logoutBtnNav" style="margin-top: 100px; opacity: 0.7;">Logout</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1 id="pageTitle" style="margin-bottom: 5px;">Community Hub</h1>
                <p id="welcomeUser" style="color: #64748b; margin: 0;">Hello, Member</p>
            </div>
            <button class="logout-btn" id="logoutBtn" style="background:#fee2e2; color:#991b1b; border:none; padding:10px 18px; border-radius:8px; cursor:pointer;">Logout</button>
        </div>

        <div class="content-grid">
            <div>
                <div id="communityTab" class="tab-content active">
                    <h3>Recent Requests (Volunteer Queue)</h3>
                    <div id="requestFeed"><p>Loading...</p></div>
                </div>

                <div id="lostFoundTab" class="tab-content">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3>Lost & Found Items</h3>
                        <button onclick="openLFModal()" style="background:#0f172a; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">+ Report Item</button>
                    </div>
                    <div id="lfFeed"><p>No items reported yet.</p></div>
                </div>
            </div>
            
            <div>
                <div class="card">
                    <h3>Active Conversations</h3>
                    <div id="activeChatsList" style="font-size: 13px; color: #64748b;">
                        <p id="noChatsMsg">No active chats.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="lfModal" class="modal">
        <div class="modal-content">
            <h2>Report Lost/Found Item</h2>
            <label>I have...</label>
            <select id="lfType">
                <option value="Lost">Lost something</option>
                <option value="Found">Found something</option>
            </select>
            <label>Item Name</label><input type="text" id="lfItem" placeholder="e.g. Blue Wallet">
            <label>Location</label><input type="text" id="lfLoc" placeholder="Where was it last seen?">
            <label>Description</label><textarea id="lfDesc" placeholder="Describe the item..."></textarea>
            <button id="submitLFBtn" style="width:100%; padding:12px; background:#38bdf8; color:#0f172a; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Post Report</button>
            <button onclick="document.getElementById('lfModal').style.display='none'" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="chatPopup">
        <div style="background:#0f172a; color:white; padding:12px; display:flex; justify-content:space-between; align-items:center;">
            <span id="chatWith" style="font-weight:600; font-size:14px;">Chat</span>
            <span onclick="document.getElementById('chatPopup').style.display='none'" style="cursor:pointer;">✕</span>
        </div>
        <div id="messageArea" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; background:#f8fafc; height:330px;"></div>
        <div style="padding:10px; border-top:1px solid #e2e8f0; display:flex; gap:5px;">
            <input type="text" id="msgInput" placeholder="Type a message..." style="flex:1;">
            <button id="sendMsgBtn" style="background:#38bdf8; border:none; color:white; padding:0 12px; border-radius:8px; cursor:pointer;">➔</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNYQbkHf9yQqGzN9qNRePHxQ5Z1dgfeE",
            authDomain: "beaconofunityofficial.firebaseapp.com",
            projectId: "beaconofunityofficial",
            storageBucket: "beaconofunityofficial.firebasestorage.app",
            messagingSenderId: "37918398882",
            appId: "1:37918398882:web:205161bb147393f4defafb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentChatId = null;
        let unsubscribeChat = null;
        let chatMessageCounts = {}; 

        const badWords = ["stupid", "idiot", "jerk", "shut up"]; 
        function censorText(text) {
            let filtered = text;
            badWords.forEach(word => { filtered = filtered.replace(new RegExp(word, "gi"), "****"); });
            return filtered;
        }

        // --- Volunteer Queue Logic ---
        window.toggleVols = (id) => {
            const el = document.getElementById(`vols-${id}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        };

        window.offerHelp = async (requestId) => {
            const user = auth.currentUser;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const userName = userDoc.exists() ? userDoc.data().fullName : "Unity Member";
            
            try {
                await updateDoc(doc(db, "requests", requestId), {
                    volunteers: arrayUnion({ uid: user.uid, name: userName }),
                    volunteerCount: increment(1)
                });
                alert("You've joined the volunteer queue!");
            } catch (e) { alert("Already joined or error occurred."); }
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(tab === 'community') {
                document.getElementById('communityTab').classList.add('active');
                document.getElementById('pageTitle').innerText = "Community Hub";
                document.querySelector('[onclick="switchTab(\'community\')"]').classList.add('active');
            } else {
                document.getElementById('lostFoundTab').classList.add('active');
                document.getElementById('pageTitle').innerText = "Lost and Found";
                document.querySelector('[onclick="switchTab(\'lostfound\')"]').classList.add('active');
                loadLF();
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    document.getElementById('welcomeUser').innerText = `Hello, ${userDoc.data().fullName}`;
                }
                loadRequests(); 
                loadActiveChats(); 
            } else {
                window.location.href = "login.html";
            }
        });

        window.startChat = async (itemId, targetUserId, itemLabel) => {
            if (auth.currentUser.uid === targetUserId) return alert("This is your post!");
            
            const targetDoc = await getDoc(doc(db, "users", targetUserId));
            const targetName = targetDoc.exists() ? targetDoc.data().fullName : "User";

            currentChatId = [auth.currentUser.uid, targetUserId].sort().join("_") + "_" + itemId;
            
            await setDoc(doc(db, "chats", currentChatId), {
                participants: [auth.currentUser.uid, targetUserId],
                itemLabel: itemLabel,
                lastUpdated: serverTimestamp()
            }, { merge: true });

            openChatWindow(targetName);
        };

        window.resumeChat = (chatID, label) => {
            currentChatId = chatID;
            const el = document.getElementById(`item-${chatID}`);
            if(el) el.classList.remove('new-message-blink');
            openChatWindow(label);
        };

        function openChatWindow(label) {
            document.getElementById('chatWith').innerText = `Chat: ${label}`;
            document.getElementById('chatPopup').style.display = 'flex';
            if (unsubscribeChat) unsubscribeChat();
            
            const q = query(collection(db, "chats", currentChatId, "messages"), orderBy("createdAt", "asc"));
            unsubscribeChat = onSnapshot(q, (snapshot) => {
                const area = document.getElementById('messageArea');
                area.innerHTML = "";
                snapshot.forEach(d => {
                    const data = d.data();
                    const isMe = data.senderId === auth.currentUser.uid;
                    const msgDiv = document.createElement('div');
                    msgDiv.style = `max-width:80%; padding:8px 12px; border-radius:12px; font-size:13px; margin-bottom:4px; ${isMe ? 'align-self:flex-end; background:#38bdf8; color:white;' : 'align-self:flex-start; background:white; border:1px solid #e2e8f0;'}`;
                    msgDiv.innerText = data.text;
                    area.appendChild(msgDiv);
                });
                area.scrollTop = area.scrollHeight;
            });
        }

        document.getElementById('sendMsgBtn').onclick = async () => {
            const input = document.getElementById('msgInput');
            const text = censorText(input.value);
            if (!text || !currentChatId) return;
            
            await addDoc(collection(db, "chats", currentChatId, "messages"), {
                text, senderId: auth.currentUser.uid, createdAt: serverTimestamp()
            });
            input.value = "";
        };

        function loadActiveChats() {
            const q = query(collection(db, "chats"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('activeChatsList');
                snapshot.forEach(async (docSnap) => {
                    const chatId = docSnap.id;
                    if (chatId.includes(auth.currentUser.uid)) {
                        const noMsg = document.getElementById('noChatsMsg');
                        if (noMsg) noMsg.remove();

                        const parts = chatId.split('_');
                        const otherUserId = parts[0] === auth.currentUser.uid ? parts[1] : parts[0];
                        const otherDoc = await getDoc(doc(db, "users", otherUserId));
                        const otherName = otherDoc.exists() ? otherDoc.data().fullName : "User";
                        const itemLabel = docSnap.data().itemLabel || "Item";

                        const msgQ = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "desc"));
                        onSnapshot(msgQ, (msgSnap) => {
                            const count = msgSnap.size;
                            const lastMsg = msgSnap.docs[0]?.data();
                            
                            let isNew = chatMessageCounts[chatId] !== undefined && count > chatMessageCounts[chatId];
                            let shouldBlink = (isNew || (lastMsg && lastMsg.senderId !== auth.currentUser.uid)) && currentChatId !== chatId;

                            let chatDiv = document.getElementById(`item-${chatId}`);
                            if (!chatDiv) {
                                chatDiv = document.createElement('div');
                                chatDiv.id = `item-${chatId}`;
                                chatDiv.className = "chat-list-item";
                                list.prepend(chatDiv);
                            }

                            if (shouldBlink) chatDiv.classList.add('new-message-blink');
                            else chatDiv.classList.remove('new-message-blink');

                            chatDiv.innerHTML = `
                                <div style="flex: 1;">
                                    <span style="font-weight:700; color:#1e293b; display:flex; align-items:center;">
                                        ${shouldBlink ? '<span class="dot"></span>' : ''}${otherName}
                                    </span>
                                    <small style="color:#64748b; display:block; margin-top:2px;">Re: ${itemLabel}</small>
                                </div>
                                <button onclick="resumeChat('${chatId}', '${otherName}')" style="background:#0f172a; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600;">Open</button>
                            `;
                            chatMessageCounts[chatId] = count;
                        });
                    }
                });
            });
        }

        function loadLF() {
            const q = query(collection(db, "lostfound"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('lfFeed');
                feed.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "card";
                    card.innerHTML = `
                        <span class="badge ${data.type === 'Lost' ? 'badge-lost' : 'badge-found'}">${data.type}</span>
                        <h4>${censorText(data.item)}</h4>
                        <p style="font-size:13px; color:#64748b;">📍 ${data.location}</p>
                        <button onclick="startChat('${docSnap.id}', '${data.userId}', '${data.item}')" style="background:#0f172a; color:white; border:none; padding:8px; border-radius:8px; width:100%; cursor:pointer;">Contact</button>
                    `;
                    feed.appendChild(card);
                });
            });
        }

        function loadRequests() {
            const q = query(collection(db, "requests"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('requestFeed');
                feed.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const isOwner = auth.currentUser.uid === data.userId;
                    const card = document.createElement('div');
                    card.className = "card request-card";

                    let volListHtml = (data.volunteers || []).map(v => `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f1f5f9;">
                            <span style="font-size:13px;">🙋‍♂️ ${v.name}</span>
                            ${isOwner ? `<button onclick="startChat('${docSnap.id}', '${v.uid}', '${data.title}')" style="background:#38bdf8; border:none; color:white; padding:4px 8px; border-radius:5px; font-size:11px; cursor:pointer;">Chat</button>` : ''}
                        </div>
                    `).join('');

                    card.innerHTML = `
                        <h4>${censorText(data.title)}</h4>
                        <p style="font-size:12px; color:#64748b; margin-bottom:15px;">Posted by: ${data.userName || 'Unity Member'}</p>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-help" style="margin:0;" onclick="offerHelp('${docSnap.id}')">I Can Help</button>
                            <button style="background:none; border:1px solid #e2e8f0; padding:8px 12px; border-radius:6px; font-size:12px; cursor:pointer;" onclick="toggleVols('${docSnap.id}')">
                                Volunteers (${data.volunteerCount || 0})
                            </button>
                        </div>
                        <div id="vols-${docSnap.id}" style="display:none; margin-top:15px; background:#f8fafc; padding:10px; border-radius:8px; border:1px solid #e2e8f0;">
                            <p style="font-size:11px; font-weight:bold; color:#64748b; margin-top:0;">HELPERS QUEUE:</p>
                            ${volListHtml || '<p style="font-size:12px; color:#94a3b8;">No volunteers yet.</p>'}
                        </div>
                    `;
                    feed.appendChild(card);
                });
            });
        }

        window.openLFModal = () => document.getElementById('lfModal').style.display = 'flex';
        document.getElementById('submitLFBtn').onclick = async () => {
            const item = censorText(document.getElementById('lfItem').value);
            const loc = document.getElementById('lfLoc').value;
            if(!item || !loc) return alert("Fill all details");
            await addDoc(collection(db, "lostfound"), {
                type: document.getElementById('lfType').value, item, location: loc,
                description: censorText(document.getElementById('lfDesc').value),
                userId: auth.currentUser.uid, userEmail: auth.currentUser.email, createdAt: serverTimestamp()
            });
            document.getElementById('lfModal').style.display = 'none';
        };

        const logout = () => signOut(auth).then(() => window.location.href = "login.html");
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('logoutBtnNav').onclick = logout;
    </script>
</body>
</html>
