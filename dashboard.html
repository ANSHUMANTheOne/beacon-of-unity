<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub | Beacon of Unity</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8fafc; display: flex; color: #1e293b; }
        
        /* Sidebar Navigation */
        .sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; padding: 25px; position: fixed; }
        .sidebar h2 { font-size: 22px; font-weight: 800; color: #38bdf8; margin-bottom: 30px; letter-spacing: -0.5px; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #1e293b; }
        .active { background: #38bdf8; color: #0f172a; font-weight: 600; }

        /* Main Content */
        .main-content { margin-left: 310px; padding: 40px; width: calc(100% - 310px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        
        /* Feed Styling */
        .request-card { border-left: 5px solid #38bdf8; margin-bottom: 15px; }
        .lost-found-card { border-left: 5px solid #f59e0b; }
        .urgency-high { border-left-color: #ef4444; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .badge-lost { background: #fef3c7; color: #92400e; }

        /* Modal */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:white; width:90%; max-width:450px; padding:30px; border-radius:20px; max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }

        .fab { position: fixed; bottom: 30px; right: 30px; background: #38bdf8; color: #0f172a; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4); z-index: 999; }
        .news-item { padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Beacon of Unity</h2>
        <div class="nav-item active">✨ Community Hub</div>
        <div class="nav-item">📢 Updates</div>
        <div class="nav-item">🗓 Events</div>
        <div class="nav-item" id="logoutBtnNav" style="margin-top: 60px; opacity: 0.7;">Logout</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="welcome-text">
                <h1 id="welcomeUser">Hello!</h1>
                <p>Stay connected with your community.</p>
            </div>
            <button class="logout-btn" id="logoutBtn" style="background: #fee2e2; color: #991b1b; border:none; padding:10px; border-radius:8px; cursor:pointer;">Logout</button>
        </div>

        <div class="content-grid">
            <div>
                <h3 id="feedTitle">Community Feed</h3>
                <div id="requestFeed"><p>Loading...</p></div>
            </div>
            
            <div>
                <div class="card">
                    <h3 style="color:#0f172a; font-size:18px;">📰 Latest News</h3>
                    <div id="newsSection">
                        <div class="news-item"><b>System Update:</b> Lost & Found section is now live!</div>
                        <div class="news-item" style="color:#64748b; font-style:italic;">More news coming soon...</div>
                    </div>
                </div>

                <div class="card">
                    <h3>Active Conversations</h3>
                    <div id="activeChatsList" style="font-size: 13px; color: #64748b;"><p>No active chats.</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="requestModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Post to Community</h2>
            <label>Post Type</label>
            <select id="postType" onchange="togglePostType()">
                <option value="request">Request Help</option>
                <option value="lost">Lost & Found</option>
            </select>

            <label>Title</label><input type="text" id="reqTitle" placeholder="Brief summary...">
            
            <div id="requestFields">
                <label>Category</label>
                <select id="reqCategory">
                    <option value="Food">Food / Groceries</option>
                    <option value="Medicine">Medicine</option>
                    <option value="Transport">Transport</option>
                </select>
                <label>Urgency</label>
                <select id="reqUrgency">
                    <option value="low">Low</option><option value="high">High</option>
                </select>
            </div>

            <label>Location</label><input type="text" id="reqLocation" placeholder="Where?">
            <label>Description</label><textarea id="reqDesc" rows="3"></textarea>
            
            <button id="submitReqBtn" style="width:100%; padding:12px; background:#0f172a; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Post to Feed</button>
            <button id="closeModalBtn" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <button class="fab" id="openModalBtn">+</button>

    <div id="chatPopup" style="display:none; position:fixed; bottom:20px; right:90px; width:320px; height:400px; background:white; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2); z-index:2000; flex-direction:column; border:1px solid #e2e8f0; overflow:hidden;">
        <div style="background:#0f172a; color:white; padding:12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleChatCollapse()">
            <span id="chatWith" style="font-weight:600; font-size:14px;">Chat</span>
            <span id="collapseIcon">▼</span>
        </div>
        <div id="chatBody" style="flex:1; display:flex; flex-direction:column;">
            <div id="messageArea" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; background:#f8fafc;"></div>
            <div style="padding:10px; border-top:1px solid #e2e8f0; background:white; display:flex; gap:5px;">
                <input type="text" id="msgInput" placeholder="Message..." style="margin:0; padding:8px;">
                <button id="sendMsgBtn" style="background:#38bdf8; border:none; border-radius:8px; padding:0 12px; color:white;">➔</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, arrayUnion, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // CONFIG (Ensure this matches yours)
        const firebaseConfig = {
            apiKey: "AIzaSyBqNYQbkHf9yQqGzN9qNRePHxQ5Z1dgfeE",
            authDomain: "beaconofunityofficial.firebaseapp.com",
            projectId: "beaconofunityofficial",
            storageBucket: "beaconofunityofficial.firebasestorage.app",
            messagingSenderId: "37918398882",
            appId: "1:37918398882:web:205161bb147393f4defafb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CENSORSHIP LOGIC ---
        const badWords = ["stupid", "idiot", "jerk", "shut up"]; 
        function censorText(text) {
            let filtered = text;
            badWords.forEach(word => {
                const regex = new RegExp(word, "gi");
                filtered = filtered.replace(regex, "****");
            });
            return filtered;
        }

        // --- UI TOGGLES ---
        window.togglePostType = () => {
            const isLost = document.getElementById('postType').value === 'lost';
            document.getElementById('requestFields').style.display = isLost ? 'none' : 'block';
        };

        // --- SUBMIT POST ---
        document.getElementById('submitReqBtn').onclick = async () => {
            const type = document.getElementById('postType').value;
            const title = censorText(document.getElementById('reqTitle').value);
            const desc = censorText(document.getElementById('reqDesc').value);
            const locName = document.getElementById('reqLocation').value;

            if(!title || !desc) return alert("Please fill title and description.");

            await addDoc(collection(db, "requests"), {
                userId: auth.currentUser.uid,
                userEmail: auth.currentUser.email,
                type: type, // 'request' or 'lost'
                title, description: desc, location: locName,
                category: type === 'lost' ? 'Lost & Found' : document.getElementById('reqCategory').value,
                urgency: type === 'lost' ? 'low' : document.getElementById('reqUrgency').value,
                volunteers: [], volunteerCount: 0,
                createdAt: serverTimestamp()
            });
            document.getElementById('requestModal').style.display = 'none';
        };

        // --- LOAD FEED ---
        function loadRequests() {
            const q = query(collection(db, "requests"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('requestFeed');
                feed.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const req = docSnap.data();
                    const card = document.createElement('div');
                    const isLost = req.type === 'lost';
                    
                    card.className = `card request-card ${isLost ? 'lost-found-card' : ''} ${req.urgency === 'high' ? 'urgency-high' : ''}`;
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <span class="badge ${isLost ? 'badge-lost' : 'badge-food'}">${req.category}</span>
                            <small>${req.location}</small>
                        </div>
                        <h4>${req.title}</h4>
                        <p style="font-size:14px;">${req.description}</p>
                        <button class="btn-help" onclick="offerHelp('${docSnap.id}')" style="background:${isLost ? '#f59e0b' : '#38bdf8'}">
                            ${isLost ? 'I Found This' : 'I Can Help'}
                        </button>
                    `;
                    feed.appendChild(card);
                });
            });
        }

        // --- INITIALIZE ---
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                document.getElementById('welcomeUser').innerText = `Welcome, ${user.email.split('@')[0]}!`;
                loadRequests(); 
                // loadActiveChats(); <-- Re-add your chat listener here
            } else { window.location.href = "login.html"; }
        });

        const modal = document.getElementById('requestModal');
        document.getElementById('openModalBtn').onclick = () => modal.style.display = 'flex';
        document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';

    </script>
</body>
</html>
