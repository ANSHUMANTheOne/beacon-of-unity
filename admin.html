<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Beacon of Unity</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8eaed; padding-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 12px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-approve { background: #34a853; color: white; margin-right: 8px; }
        .btn-approve:hover { background: #2d8e47; }
        .btn-deny { background: #ea4335; color: white; }
        .btn-deny:hover { background: #d93025; }
        .id-link { color: #1a73e8; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Resident Verification Queue</h2>
    <table id="requestsTable">
        <thead>
            <tr>
                <th>Resident Email</th>
                <th>ID Document</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // CORRECTED CONFIG BASED ON YOUR FIREBASE SCREENSHOT
    const firebaseConfig = {
        apiKey: "AIzaSyBqNYQbkHf9yQqGzN9qNRePHxQ5Z1dgfeE",
        authDomain: "beaconofunityofficial.firebaseapp.com",
        projectId: "beaconofunityofficial", 
        storageBucket: "beaconofunityofficial.firebasestorage.app",
        messagingSenderId: "37918398882",
        appId: "1:37918398882:web:205161bb147393f4defafb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // WE ATTACH TO WINDOW SO THE HTML BUTTONS CAN CALL THIS
    window.processUser = async (docId, userEmail, action, userId) => {
        const WORKER_URL = "https://brevo-proxy.anshorg.workers.dev/"; 
        const BREVO_LIST_ID = 2; 

        if (action === 'approve') {
            try {
                // 1. Trigger the Brevo Welcome Email via Cloudflare
                const res = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: userEmail,
                        listIds: [BREVO_LIST_ID],
                        updateEnabled: true
                    })
                });

                if (res.ok) {
                    // 2. Update status to "approved" (lowercase to match your dashboard check)
                    const userRef = doc(db, "users", userId);
                    await updateDoc(userRef, { 
                        status: "approved",
                        approvedAt: new Date().toISOString()
                    });

                    // 3. Remove from the Review Queue
                    await deleteDoc(doc(db, "id_reviews", docId));
                    
                    alert("User Approved! They can now access the Hub.");
                    loadData();
                } else {
                    alert("Worker Error: Check your BREVO_KEY in Cloudflare settings.");
                }
            } catch (e) {
                console.error("System Error:", e);
                alert("Failed to connect to proxy.");
            }
        } else {
            // If Denied
            await deleteDoc(doc(db, "id_reviews", docId));
            alert("Verification denied and removed.");
            loadData();
        }
    };

    // LOAD THE PENDING REQUESTS
    async function loadData() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "<tr><td colspan='3'>Searching for new verification requests...</td></tr>";
        
        try {
            const querySnapshot = await getDocs(collection(db, "id_reviews"));
            tableBody.innerHTML = "";

            if (querySnapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='3'>No pending verifications.</td></tr>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = `
                    <tr>
                        <td>${data.email}</td>
                        <td><a href="${data.idCardUrl}" target="_blank" class="id-link">View Uploaded ID</a></td>
                        <td>
                            <button onclick="processUser('${doc.id}', '${data.email}', 'approve', '${data.userId}')" class="btn btn-approve">Approve</button>
                            <button onclick="processUser('${doc.id}', '${data.email}', 'deny', '${data.userId}')" class="btn btn-deny">Deny</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        } catch (err) {
            console.error("Firestore Load Error:", err);
            tableBody.innerHTML = "<tr><td colspan='3' style='color:red;'>Error loading data. Check Project ID.</td></tr>";
        }
    }

    // Run on startup
    loadData();
</script>

</body>
</html>
