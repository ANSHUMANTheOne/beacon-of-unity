<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Beacon of Unity</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("QhpmiLS1azGRS4w23"); 
       })();
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8eaed; padding-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 12px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-approve { background: #34a853; color: white; margin-right: 8px; }
        .btn-approve:hover { background: #2d8e47; }
        .btn-deny { background: #ea4335; color: white; }
        .btn-deny:hover { background: #d93025; }
        .btn-reset { background: #5f6368; color: white; margin-bottom: 20px; }
        .btn-reset:hover { background: #3c4043; }
        .id-link { color: #1a73e8; text-decoration: none; font-weight: 500; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 10px; text-transform: uppercase; }
        .badge-new { background: #e6f4ea; color: #1e8e3e; }
        .badge-retry { background: #fce8e6; color: #d93025; }
    </style>
</head>
<body>

<div class="container">
    <h2>Resident Verification Queue</h2>
    
    <button onclick="resetTester()" class="btn btn-reset">
       🔄 Reset Tester (rashmibiswa2008@gmail.com)
    </button>

    <table id="requestsTable">
        <thead>
            <tr>
                <th>Resident Email</th>
                <th>ID Document</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqNYQbkHf9yQqGzN9qNRePHxQ5Z1dgfeE",
        authDomain: "beaconofunityofficial.firebaseapp.com",
        projectId: "beaconofunityofficial", 
        storageBucket: "beaconofunityofficial.firebasestorage.app",
        messagingSenderId: "37918398882",
        appId: "1:37918398882:web:205161bb147393f4defafb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.resetTester = async () => {
        const testerEmail = "rashmibiswa2008@gmail.com";
        try {
            const q = query(collection(db, "users"), where("email", "==", testerEmail));
            const querySnapshot = await getDocs(q);
            if (querySnapshot.empty) {
                alert("Tester account not found.");
                return;
            }
            const userDoc = querySnapshot.docs[0];
            const userRef = doc(db, "users", userDoc.id);

            // Fully wipe the tester's history
            await updateDoc(userRef, {
                status: "none",
                hasPreviousDenial: false 
            });

            const reviewQ = query(collection(db, "id_reviews"), where("email", "==", testerEmail));
            const reviewDocs = await getDocs(reviewQ);
            const deletePromises = reviewDocs.docs.map(d => deleteDoc(doc(db, "id_reviews", d.id)));
            await Promise.all(deletePromises);

            alert("✅ Tester Reset! Completely clean slate.");
            loadData();
        } catch (err) {
            alert("Reset Error.");
        }
    };

    window.processUser = async (docId, userEmail, action, userId) => {
        const userRef = doc(db, "users", userId);

        if (action === 'approve') {
            try {
                const templateParams = {
                    email: userEmail, // Matching your EmailJS {{email}} tag
                    name: userEmail.split('@')[0]
                };

                await emailjs.send("service_w3ai9pm", "template_zttw3uf", templateParams);

                await updateDoc(userRef, { 
                    status: "approved", 
                    approvedAt: new Date().toISOString() 
                });

                await deleteDoc(doc(db, "id_reviews", docId));
                alert("Success! Welcome email sent.");
                loadData();
            } catch (e) {
                alert("Approval Error: " + (e.text || "Check console"));
            }
        } else {
            // --- UPDATED DENY LOGIC (NO MORE BLOCKING) ---
            try {
                await updateDoc(userRef, { 
                    status: "rejected",
                    hasPreviousDenial: true // Permanent flag for retries
                });

                await deleteDoc(doc(db, "id_reviews", docId));
                alert("User Denied. They are flagged for retry.");
                loadData();
            } catch (err) {
                alert("Error processing denial.");
            }
        }
    };

    async function loadData() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "<tr><td colspan='3'>Searching...</td></tr>";
        try {
            const querySnapshot = await getDocs(collection(db, "id_reviews"));
            tableBody.innerHTML = "";
            if (querySnapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='3'>No pending requests.</td></tr>";
                return;
            }
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                
                // Show a tag based on whether they were denied before
                const tag = data.hasPreviousDenial 
                    ? `<span class="badge badge-retry">Retrying</span>` 
                    : `<span class="badge badge-new">New</span>`;

                tableBody.innerHTML += `
                    <tr>
                        <td>${data.email} ${tag}</td>
                        <td><a href="${data.idCardUrl}" target="_blank" class="id-link">View ID</a></td>
                        <td>
                            <button onclick="processUser('${docSnap.id}', '${data.email}', 'approve', '${data.userId}')" class="btn btn-approve">Approve</button>
                            <button onclick="processUser('${docSnap.id}', '${data.email}', 'deny', '${data.userId}')" class="btn btn-deny">Deny</button>
                        </td>
                    </tr>`;
            });
        } catch (err) {
            tableBody.innerHTML = "<tr><td colspan='3'>Error loading data.</td></tr>";
        }
    }
    loadData();
</script>
</body>
</html>
