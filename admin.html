<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon of Unity | Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #3498db; color: white; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-approve { background: #2ecc71; color: white; }
        .btn-deny { background: #e74c3c; color: white; }
        .id-link { color: #3498db; text-decoration: none; font-weight: bold; }
        .id-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pending Resident Verifications</h2>
    <table id="requestsTable">
        <thead>
            <tr>
                <th>Email</th>
                <th>ID Document</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "beacon-of-unity.firebaseapp.com",
        projectId: "beacon-of-unity",
        storageBucket: "beacon-of-unity.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- ADMIN ACTIONS ---
    window.processUser = async (docId, userEmail, action, userId) => {
        const BREVO_API_KEY = "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";
        const BREVO_LIST_ID = 2; // Verify this matches your List ID in Brevo

        if (action === 'approve') {
            try {
                // 1. ADD TO BREVO (Triggers Email)
                const brevoRes = await fetch("https://api.brevo.com/v3/contacts", {
                    method: "POST",
                    headers: {
                        "accept": "application/json",
                        "api-key": BREVO_API_KEY,
                        "content-type": "application/json"
                    },
                    body: JSON.stringify({
                        email: userEmail,
                        listIds: [BREVO_LIST_ID],
                        updateEnabled: true
                    })
                });

                if (brevoRes.ok) {
                    // 2. UPDATE FIREBASE USER STATUS
                    const userRef = doc(db, "users", userId);
                    await updateDoc(userRef, { status: "approved" });

                    // 3. DELETE REVIEW REQUEST
                    await deleteDoc(doc(db, "id_reviews", docId));
                    
                    alert("SUCCESS: Resident Approved & Email Sent!");
                } else {
                    alert("Brevo Error: Check your List ID or API Key.");
                }
            } catch (e) {
                console.error(e);
                alert("Error during approval.");
            }
        } else {
            // Deny Action
            await deleteDoc(doc(db, "id_reviews", docId));
            alert("Request Denied.");
        }
        loadData();
    };

    // --- LOAD DATA ---
    async function loadData() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "<tr><td colspan='3'>Loading requests...</td></tr>";
        
        const querySnapshot = await getDocs(collection(db, "id_reviews"));
        tableBody.innerHTML = "";

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const row = `
                <tr>
                    <td>${data.email}</td>
                    <td><a href="${data.idCardUrl}" target="_blank" class="id-link">View Emirates ID</a></td>
                    <td>
                        <button onclick="processUser('${doc.id}', '${data.email}', 'approve', '${data.userId}')" class="btn btn-approve">Approve</button>
                        <button onclick="processUser('${doc.id}', '${data.email}', 'deny', '${data.userId}')" class="btn btn-deny">Deny</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        if (querySnapshot.empty) {
            tableBody.innerHTML = "<tr><td colspan='3'>No pending requests.</td></tr>";
        }
    }

    loadData();
</script>

</body>
</html>
